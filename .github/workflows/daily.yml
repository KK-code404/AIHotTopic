name: AI Daily Push

on:
  schedule:
    # GitHub Actions cron uses UTC. 01:00 UTC = 09:00 Asia/Shanghai.
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: ai-daily-push
  cancel-in-progress: false

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Generate and push AI daily report
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_CHANNEL: clawbot
          NEWS_LOOKBACK_HOURS: "48"
          MAX_PER_SOURCE: "8"
          TOP_N: "7"
        run: python main.py
